<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Buscador de ID para SEPREX</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0c10;
        --panel: #121318;
        --panel-2: #181a20;
        --text: #f3f4f6;
        --muted: #a3a8b3;
        --line: #2a2d36;
        --brand: #b4232a;
        --brand-dark: #8f1d24;
        --brand-glow: rgba(226, 40, 53, 0.2);
        --ok: #ef4444;
        --bad: #ff6b6b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 18% 12%, rgba(180, 35, 42, 0.24), transparent 28%),
          linear-gradient(180deg, #101116 0%, var(--bg) 42%, #07080b 100%);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(980px, calc(100% - 32px));
        margin: 0 auto;
        padding: 44px 0;
      }

      .top {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 5vw, 44px);
        line-height: 1.05;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1::before {
        content: "> ";
        color: var(--brand);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }

      .panel {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 42%), var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(180, 35, 42, 0.08);
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 650;
      }

      textarea {
        width: 100%;
        min-height: 180px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px 14px;
        color: var(--text);
        background: #0a0b0f;
        font: 14px/1.55 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        line-height: 1.45;
        outline: none;
      }

      textarea::placeholder {
        color: #6f7684;
      }

      textarea:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 4px var(--brand-glow);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
      }

      button {
        min-height: 42px;
        border: 0;
        border-radius: 8px;
        padding: 0 16px;
        background: linear-gradient(180deg, #d53640, var(--brand));
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        box-shadow: 0 10px 26px rgba(180, 35, 42, 0.26);
      }

      button:hover {
        background: linear-gradient(180deg, #c92e38, var(--brand-dark));
      }

      button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      button.secondary {
        background: #1f222a;
        color: #fca5a5;
        border: 1px solid #3a2025;
        box-shadow: none;
      }

      button.secondary:hover {
        background: #2a1d22;
      }

      .hint {
        margin-top: 10px;
        font-size: 14px;
      }

      .result {
        display: none;
        margin-top: 18px;
      }

      .result.is-visible {
        display: block;
      }

      .status {
        margin-bottom: 10px;
        color: var(--muted);
        font-size: 14px;
      }

      .table-wrap {
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #0a0b0f;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background: #0a0b0f;
      }

      th,
      td {
        padding: 11px 12px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #17191f;
        font-size: 13px;
        color: #fca5a5;
        text-transform: uppercase;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      td.owner {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-weight: 700;
        color: #f3f4f6;
      }

      td.missing {
        color: var(--bad);
        font-weight: 650;
      }

      .copy-ok {
        display: none;
        align-self: center;
        color: var(--ok);
        font-size: 14px;
        font-weight: 650;
      }

      .copy-ok.is-visible {
        display: inline;
      }

      @media (max-width: 680px) {
        main {
          padding: 28px 0;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="top">
        <h1>Buscador de ID para SEPREX</h1>
        <p>Pegá varios links de MercadoLibre, uno por línea. Devuelve una tabla lista para copiar y pegar en Excel.</p>
      </section>

      <section class="panel">
        <form id="finder-form">
          <label for="urls">Links de MercadoLibre</label>
          <textarea id="urls" name="urls" required placeholder="https://listado.mercadolibre.com.ar/pagina/nombre-vendedor/...
https://perfil.mercadolibre.com.ar/NOMBRE-VENDEDOR
https://www.mercadolibre.com.ar/producto...?pdp_filters=seller_id%3A123456789"></textarea>

          <div class="actions">
            <button id="submit" type="submit">Buscar IDs</button>
            <button id="copy" class="secondary" type="button" disabled>Copiar para Excel</button>
            <span id="copy-ok" class="copy-ok">Copiado</span>
          </div>
        </form>

        <p class="hint">Columnas de salida: <b>Nombre del seller</b> y <b>ownerID</b>.</p>

        <div id="result" class="result" aria-live="polite"></div>
      </section>
    </main>

    <script>
      const form = document.querySelector("#finder-form");
      const textarea = document.querySelector("#urls");
      const submit = document.querySelector("#submit");
      const copy = document.querySelector("#copy");
      const copyOk = document.querySelector("#copy-ok");
      const result = document.querySelector("#result");
      let currentRows = [];

      function splitLinks(value) {
        return value
          .split(/\n+/)
          .map((line) => line.trim())
          .filter(Boolean);
      }

      function rowsToTsv(rows) {
        const lines = rows.map((row) => [row.sellerName || "", row.ownerId || ""]);
        return lines.map((cells) => cells.map(cleanCell).join("\t")).join("\n");
      }

      function cleanCell(value) {
        return String(value).replaceAll("\t", " ").replaceAll(/\r?\n/g, " ").trim();
      }

      function renderRows(rows) {
        currentRows = rows;
        copy.disabled = rows.length === 0;
        result.className = "result is-visible";

        const found = rows.filter((row) => row.ownerId).length;
        result.innerHTML = `
          <div class="status">${found} de ${rows.length} IDs encontrados</div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Nombre del seller</th>
                  <th>ownerID</th>
                </tr>
              </thead>
              <tbody>
                ${rows.map(renderRow).join("")}
              </tbody>
            </table>
          </div>
        `;
      }

      function renderRow(row) {
        return `
          <tr>
            <td>${escapeHtml(row.sellerName || "")}</td>
            <td class="${row.ownerId ? "owner" : "missing"}">${escapeHtml(row.ownerId || "No encontrado")}</td>
          </tr>
        `;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const urls = splitLinks(textarea.value);

        submit.disabled = true;
        copy.disabled = true;
        copyOk.className = "copy-ok";
        submit.textContent = "Buscando...";
        result.className = "result is-visible";
        result.innerHTML = "<p>Consultando MercadoLibre...</p>";

        try {
          const response = await fetch("/api/find-seller-id", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ urls }),
          });
          const payload = await response.json();

          if (!response.ok || payload.error) {
            result.innerHTML = `<div class="status">${escapeHtml(payload.error || "No se pudo procesar.")}</div>`;
            currentRows = [];
            return;
          }

          renderRows(payload.rows || []);
        } catch (error) {
          currentRows = [];
          result.innerHTML = "<div class=\"status\">No pude conectar con el servidor local.</div>";
        } finally {
          submit.disabled = false;
          submit.textContent = "Buscar IDs";
        }
      });

      copy.addEventListener("click", async () => {
        if (!currentRows.length) return;

        await navigator.clipboard.writeText(rowsToTsv(currentRows));
        copyOk.className = "copy-ok is-visible";
        setTimeout(() => {
          copyOk.className = "copy-ok";
        }, 1800);
      });
    </script>
  </body>
</html>
